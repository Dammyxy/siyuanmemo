name: Build SiYuan Dev Win64

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "要打包的分支"
        required: true
        default: "dev"

permissions:
  contents: read

jobs:
  build-win64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-lua p7zip

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: kernel/go.mod
          cache-dependency-path: kernel/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable pnpm
        working-directory: app
        shell: pwsh
        run: |
          corepack enable
          $pm = node -p "require('./package.json').packageManager"
          corepack prepare $pm --activate
          pnpm --version

      - name: Install frontend dependencies
        working-directory: app
        shell: pwsh
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: app
        shell: pwsh
        run: pnpm run build

      - name: Prepare package dirs
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force app\build, app\kernel, app\kernel-linux, app\kernel-darwin, app\kernel-darwin-arm64 -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force app\kernel | Out-Null

      - name: Generate Windows version info
        working-directory: kernel
        shell: pwsh
        env:
          GO111MODULE: on
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          $gopath = go env GOPATH
          & "$gopath\bin\goversioninfo.exe" -platform-specific=true -icon="resource\icon.ico" -manifest="resource\goversioninfo.exe.manifest"

      - name: Build kernel
        working-directory: kernel
        shell: pwsh
        env:
          GO111MODULE: on
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
        run: |
          $module = go list -m
          go build -tags fts5 -o "..\app\kernel\SiYuan-Kernel.exe" -v -ldflags "-s -w -H=windowsgui -X $module/util.Mode=prod"

      - name: Build Windows installer
        working-directory: app
        shell: pwsh
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm exec electron-builder --config electron-builder.yml --publish=never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: siyuan-dev-win64
          if-no-files-found: error
          path: |
            app/build/*.exe
            app/build/*.blockmap
